<svg viewBox="0 0 900 680" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555555"/>
    </marker>
  </defs>
  <rect width="900" height="680" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#222222">MiniSIEM — Kiến trúc hệ thống (Wazuh + Suricata)</text>

  <!-- LAYER 1: Endpoints -->
  <rect x="20" y="55" width="860" height="150" rx="10" fill="#E6F1FB" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="40" y="78" font-size="13" font-weight="bold" fill="#0C447C">Tầng 1 — Endpoint (cài native, không dùng Docker)</text>

  <!-- Endpoint 1: Windows -->
  <rect x="50" y="88" width="220" height="105" rx="6" fill="#ffffff" stroke="#6c8ebf"/>
  <text x="160" y="108" text-anchor="middle" font-size="12" font-weight="bold" fill="#0C447C">Windows Endpoint</text>
  <text x="160" y="126" text-anchor="middle" font-size="11" fill="#444444">Wazuh Agent</text>
  <text x="160" y="142" text-anchor="middle" font-size="10" fill="#666666">• Windows Event Log</text>
  <text x="160" y="156" text-anchor="middle" font-size="10" fill="#666666">• File Integrity Monitoring</text>
  <text x="160" y="170" text-anchor="middle" font-size="10" fill="#666666">• Vulnerability scan</text>
  <text x="160" y="184" text-anchor="middle" font-size="10" fill="#666666">• eve.json (Suricata)</text>

  <!-- Endpoint 2: Linux -->
  <rect x="290" y="88" width="220" height="105" rx="6" fill="#ffffff" stroke="#6c8ebf"/>
  <text x="400" y="108" text-anchor="middle" font-size="12" font-weight="bold" fill="#0C447C">Linux Endpoint</text>
  <text x="400" y="126" text-anchor="middle" font-size="11" fill="#444444">Wazuh Agent</text>
  <text x="400" y="142" text-anchor="middle" font-size="10" fill="#666666">• Syslog / Auth log</text>
  <text x="400" y="156" text-anchor="middle" font-size="10" fill="#666666">• File Integrity Monitoring</text>
  <text x="400" y="170" text-anchor="middle" font-size="10" fill="#666666">• Vulnerability scan</text>
  <text x="400" y="184" text-anchor="middle" font-size="10" fill="#666666">• eve.json (Suricata)</text>

  <!-- Endpoint 3: Suricata -->
  <rect x="530" y="88" width="220" height="105" rx="6" fill="#ffffff" stroke="#6c8ebf"/>
  <text x="640" y="108" text-anchor="middle" font-size="12" font-weight="bold" fill="#0C447C">Network Monitor</text>
  <text x="640" y="126" text-anchor="middle" font-size="11" fill="#444444">Suricata IDS</text>
  <text x="640" y="142" text-anchor="middle" font-size="10" fill="#666666">• Listen network interface</text>
  <text x="640" y="156" text-anchor="middle" font-size="10" fill="#666666">• Emerging Threats rules</text>
  <text x="640" y="170" text-anchor="middle" font-size="10" fill="#666666">• Signature-based detection</text>
  <text x="640" y="184" text-anchor="middle" font-size="10" fill="#666666">• Output: eve.json alerts</text>

  <!-- pcap mode -->
  <rect x="770" y="88" width="90" height="105" rx="6" fill="#fffde7" stroke="#f9a825"/>
  <text x="815" y="115" text-anchor="middle" font-size="10" font-weight="bold" fill="#854F0B">Offline</text>
  <text x="815" y="130" text-anchor="middle" font-size="10" fill="#854F0B">pcap</text>
  <text x="815" y="148" text-anchor="middle" font-size="10" fill="#854F0B">analysis</text>
  <text x="815" y="163" text-anchor="middle" font-size="10" fill="#666666">suricata</text>
  <text x="815" y="176" text-anchor="middle" font-size="10" fill="#666666">-r file.pcap</text>

  <!-- Arrows Layer 1 -> 2 -->
  <line x1="160" y1="205" x2="300" y2="270" stroke="#555555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="185" y="240" font-size="10" fill="#555555">TLS :1514</text>
  <line x1="400" y1="205" x2="400" y2="268" stroke="#555555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="408" y="240" font-size="10" fill="#555555">TLS :1514</text>
  <line x1="640" y1="205" x2="500" y2="270" stroke="#555555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="560" y="240" font-size="10" fill="#555555">TLS :1514</text>
  <line x1="815" y1="193" x2="500" y2="270" stroke="#f9a825" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arr)"/>

  <!-- LAYER 2: Wazuh Manager -->
  <rect x="20" y="270" width="860" height="90" rx="10" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.5"/>
  <text x="40" y="293" font-size="13" font-weight="bold" fill="#085041">Tầng 2 — Wazuh Manager (Docker container)</text>
  <rect x="80" y="303" width="200" height="45" rx="6" fill="#ffffff" stroke="#1D9E75"/>
  <text x="180" y="322" text-anchor="middle" font-size="11" fill="#222222">Log Decoder</text>
  <text x="180" y="338" text-anchor="middle" font-size="10" fill="#666666">Parse + normalize logs</text>
  <rect x="310" y="303" width="200" height="45" rx="6" fill="#ffffff" stroke="#1D9E75"/>
  <text x="410" y="322" text-anchor="middle" font-size="11" fill="#222222">Rules Engine</text>
  <text x="410" y="338" text-anchor="middle" font-size="10" fill="#666666">1000+ built-in rules</text>
  <rect x="540" y="303" width="200" height="45" rx="6" fill="#ffffff" stroke="#1D9E75"/>
  <text x="640" y="322" text-anchor="middle" font-size="11" fill="#222222">Alert Generator</text>
  <text x="640" y="338" text-anchor="middle" font-size="10" fill="#666666">Level 1-15, real-time</text>

  <!-- Arrow Layer 2 -> 3 -->
  <line x1="450" y1="360" x2="450" y2="388" stroke="#555555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- LAYER 3: Wazuh Indexer -->
  <rect x="20" y="390" width="860" height="80" rx="10" fill="#FAEEDA" stroke="#d79b00" stroke-width="1.5"/>
  <text x="40" y="413" font-size="13" font-weight="bold" fill="#854F0B">Tầng 3 — Wazuh Indexer (Docker container) — OpenSearch</text>
  <rect x="150" y="423" width="260" height="35" rx="6" fill="#ffffff" stroke="#d79b00"/>
  <text x="280" y="445" text-anchor="middle" font-size="11" fill="#222222">Index và lưu trữ security events</text>
  <rect x="490" y="423" width="260" height="35" rx="6" fill="#ffffff" stroke="#d79b00"/>
  <text x="620" y="445" text-anchor="middle" font-size="11" fill="#222222">Full-text search + aggregation</text>

  <!-- Arrow Layer 3 -> 4 -->
  <line x1="450" y1="470" x2="450" y2="498" stroke="#555555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- LAYER 4: Wazuh Dashboard -->
  <rect x="20" y="500" width="860" height="80" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
  <text x="40" y="523" font-size="13" font-weight="bold" fill="#3C3489">Tầng 4 — Wazuh Dashboard (Docker container) — https://localhost</text>
  <rect x="80" y="533" width="180" height="35" rx="6" fill="#ffffff" stroke="#534AB7"/>
  <text x="170" y="555" text-anchor="middle" font-size="11" fill="#222222">Security Events</text>
  <rect x="280" y="533" width="180" height="35" rx="6" fill="#ffffff" stroke="#534AB7"/>
  <text x="370" y="555" text-anchor="middle" font-size="11" fill="#222222">Agents Management</text>
  <rect x="480" y="533" width="180" height="35" rx="6" fill="#ffffff" stroke="#534AB7"/>
  <text x="570" y="555" text-anchor="middle" font-size="11" fill="#222222">Threat Intelligence</text>
  <rect x="680" y="533" width="180" height="35" rx="6" fill="#ffffff" stroke="#534AB7"/>
  <text x="770" y="555" text-anchor="middle" font-size="11" fill="#222222">Vulnerability Detector</text>

  <!-- Arrow Layer 4 -> User -->
  <line x1="450" y1="580" x2="450" y2="608" stroke="#555555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- User -->
  <rect x="250" y="610" width="400" height="50" rx="10" fill="#F1EFE8" stroke="#999999"/>
  <text x="450" y="640" text-anchor="middle" font-size="13" fill="#333333">👤 Người dùng — Browser (https://localhost:443)</text>

  <!-- Docker badge -->
  <rect x="840" y="270" width="40" height="310" rx="6" fill="#F1EFE8" stroke="#cccccc"/>
  <text x="860" y="450" text-anchor="middle" font-size="10" fill="#666666" transform="rotate(-90,860,450)">Docker Compose Network</text>
</svg>
