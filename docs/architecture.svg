<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555555"/>
    </marker>
  </defs>
  <rect width="900" height="620" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#222222">MiniSIEM — Kiến trúc hệ thống</text>

  <!-- Layer 1: Input -->
  <rect x="20" y="60" width="860" height="100" rx="10" fill="#E6F1FB" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="40" y="85" font-size="13" font-weight="bold" fill="#0C447C">Tầng 1 — Nguồn dữ liệu</text>
  <rect x="60" y="95" width="220" height="50" rx="6" fill="#ffffff" stroke="#6c8ebf"/>
  <text x="170" y="125" text-anchor="middle" font-size="13" fill="#222222">Traffic mạng (real-time)</text>
  <rect x="340" y="95" width="220" height="50" rx="6" fill="#ffffff" stroke="#6c8ebf"/>
  <text x="450" y="125" text-anchor="middle" font-size="13" fill="#222222">File .pcap (offline)</text>
  <rect x="620" y="95" width="220" height="50" rx="6" fill="#ffffff" stroke="#6c8ebf"/>
  <text x="730" y="125" text-anchor="middle" font-size="13" fill="#222222">Network interface (eth0/wlan0)</text>

  <!-- Arrow 1->2 -->
  <line x1="450" y1="160" x2="450" y2="188" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Layer 2: Zeek -->
  <rect x="20" y="190" width="860" height="100" rx="10" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.5"/>
  <text x="40" y="215" font-size="13" font-weight="bold" fill="#085041">Tầng 2 — Network IDS (Zeek)</text>
  <rect x="60" y="225" width="180" height="50" rx="6" fill="#ffffff" stroke="#1D9E75"/>
  <text x="150" y="248" text-anchor="middle" font-size="12" fill="#222222">conn.log</text>
  <text x="150" y="264" text-anchor="middle" font-size="11" fill="#555555">Kết nối mạng</text>
  <rect x="260" y="225" width="180" height="50" rx="6" fill="#ffffff" stroke="#1D9E75"/>
  <text x="350" y="248" text-anchor="middle" font-size="12" fill="#222222">dns.log</text>
  <text x="350" y="264" text-anchor="middle" font-size="11" fill="#555555">DNS queries</text>
  <rect x="460" y="225" width="180" height="50" rx="6" fill="#ffffff" stroke="#1D9E75"/>
  <text x="550" y="248" text-anchor="middle" font-size="12" fill="#222222">http.log</text>
  <text x="550" y="264" text-anchor="middle" font-size="11" fill="#555555">HTTP traffic</text>
  <rect x="660" y="225" width="180" height="50" rx="6" fill="#ffffff" stroke="#1D9E75"/>
  <text x="750" y="248" text-anchor="middle" font-size="12" fill="#222222">notice.log / weird.log</text>
  <text x="750" y="264" text-anchor="middle" font-size="11" fill="#555555">Cảnh báo bảo mật</text>

  <!-- Arrow 2->3 -->
  <line x1="450" y1="290" x2="450" y2="318" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Layer 3: Promtail -->
  <rect x="20" y="320" width="860" height="80" rx="10" fill="#FAEEDA" stroke="#d79b00" stroke-width="1.5"/>
  <text x="40" y="345" font-size="13" font-weight="bold" fill="#854F0B">Tầng 3 — Log Shipper (Promtail)</text>
  <rect x="200" y="355" width="500" height="35" rx="6" fill="#ffffff" stroke="#d79b00"/>
  <text x="450" y="377" text-anchor="middle" font-size="12" fill="#222222">Thu thập log → Gắn labels (job, log_type) → Push vào Loki API</text>

  <!-- Arrow 3->4 -->
  <line x1="450" y1="400" x2="450" y2="428" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Layer 4: Loki -->
  <rect x="20" y="430" width="860" height="80" rx="10" fill="#FCEBEB" stroke="#A32D2D" stroke-width="1.5"/>
  <text x="40" y="455" font-size="13" font-weight="bold" fill="#A32D2D">Tầng 4 — Log Database (Grafana Loki)</text>
  <rect x="150" y="465" width="250" height="35" rx="6" fill="#ffffff" stroke="#A32D2D"/>
  <text x="275" y="487" text-anchor="middle" font-size="12" fill="#222222">Lưu trữ compressed chunks</text>
  <rect x="500" y="465" width="250" height="35" rx="6" fill="#ffffff" stroke="#A32D2D"/>
  <text x="625" y="487" text-anchor="middle" font-size="12" fill="#222222">Index theo labels (không full-text)</text>

  <!-- Arrow 4->5 -->
  <line x1="450" y1="510" x2="450" y2="538" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Layer 5: Grafana -->
  <rect x="20" y="540" width="860" height="60" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
  <text x="40" y="565" font-size="13" font-weight="bold" fill="#3C3489">Tầng 5 — Visualization (Grafana) — localhost:3000</text>
  <rect x="200" y="553" width="160" height="35" rx="6" fill="#ffffff" stroke="#534AB7"/>
  <text x="280" y="575" text-anchor="middle" font-size="12" fill="#222222">Overview Dashboard</text>
  <rect x="380" y="553" width="160" height="35" rx="6" fill="#ffffff" stroke="#534AB7"/>
  <text x="460" y="575" text-anchor="middle" font-size="12" fill="#222222">Network Dashboard</text>
  <rect x="560" y="553" width="160" height="35" rx="6" fill="#ffffff" stroke="#534AB7"/>
  <text x="640" y="575" text-anchor="middle" font-size="12" fill="#222222">Security Dashboard</text>

  <!-- Docker Compose label -->
  <rect x="840" y="190" width="50" height="430" rx="6" fill="#F1EFE8" stroke="#999999" stroke-width="1"/>
  <text x="865" y="420" text-anchor="middle" font-size="11" fill="#666666" transform="rotate(-90, 865, 420)">Docker Compose Network</text>
</svg>
