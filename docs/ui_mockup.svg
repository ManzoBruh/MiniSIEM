  <text x="607" y="160" font-size="24" font-weight="bold" fill="#3B82F6">2,341</text>

  <rect x="778" y="104" width="200" height="70" rx="6" fill="#1f2028" stroke="#2a2d38"/>
  <text x="793" y="128" font-size="12" fill="#888888">Data transferred</text>
