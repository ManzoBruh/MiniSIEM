    <text x="732" y="268">10.0.0.55</text><text x="920" y="268" text-anchor="end" fill="#3B82F6">2,108</text>
    <line x1="732" y1="280" x2="970" y2="280" stroke="#2a2d38"/>
    <text x="732" y="300">45.33.12.8</text><text x="920" y="300" text-anchor="end" fill="#F97316">891</text>
    <line x1="732" y1="312" x2="970" y2="312" stroke="#2a2d38"/>
    <text x="732" y="332">8.8.8.8</text><text x="920" y="332" text-anchor="end" fill="#3B82F6">445</text>
    <line x1="732" y1="344" x2="970" y2="344" stroke="#2a2d38"/>
    <text x="732" y="364">1.1.1.1</text><text x="920" y="364" text-anchor="end" fill="#3B82F6">312</text>
  </g>

