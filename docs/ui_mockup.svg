<svg viewBox="0 0 1000 580" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <rect width="1000" height="580" rx="8" fill="#111217"/>

  <!-- Browser bar -->
  <rect x="0" y="0" width="1000" height="36" rx="8" fill="#1f2028"/>
