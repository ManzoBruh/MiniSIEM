  <text x="416" y="449" text-anchor="middle" font-size="10" fill="#F97316">Scan::Port_Scan</text>
  <text x="520" y="450" font-size="11" fill="#D3D1C7">10.6.13.133</text>
  <text x="660" y="450" font-size="11" fill="#888888">Address scan of 187 hosts</text>

  <rect x="220" y="458" width="758" height="24" fill="#16181f"/>
  <text x="236" y="474" font-size="11" fill="#888888">2026-07-20 14:31:55</text>
  <rect x="376" y="461" width="100" height="16" rx="8" fill="#EF4444" fill-opacity="0.2"/>
  <text x="426" y="473" text-anchor="middle" font-size="10" fill="#EF4444">DNS::Tunneling</text>
  <text x="520" y="474" font-size="11" fill="#D3D1C7">10.6.13.133</text>
  <text x="660" y="474" font-size="11" fill="#888888">201 DNS queries — possible tunneling</text>

  <rect x="220" y="482" width="758" height="24" fill="#1f2028"/>
  <text x="236" y="498" font-size="11" fill="#888888">2026-07-20 14:30:12</text>
  <rect x="376" y="485" width="110" height="16" rx="8" fill="#F59E0B" fill-opacity="0.2"/>
  <text x="431" y="497" text-anchor="middle" font-size="10" fill="#F59E0B">Weird::Bad_TCP_Flags</text>
  <text x="520" y="498" font-size="11" fill="#D3D1C7">192.168.1.50</text>
  <text x="660" y="498" font-size="11" fill="#888888">SYN scan detected on port 445</text>

  <rect x="220" y="506" width="758" height="24" fill="#16181f"/>
  <text x="236" y="522" font-size="11" fill="#888888">2026-07-20 14:28:44</text>
  <rect x="376" y="509" width="90" height="16" rx="8" fill="#10B981" fill-opacity="0.2"/>
  <text x="421" y="521" text-anchor="middle" font-size="10" fill="#10B981">SSL::Invalid_Cert</text>
  <text x="520" y="522" font-size="11" fill="#D3D1C7">104.21.96.1</text>
  <text x="660" y="522" font-size="11" fill="#888888">Self-signed certificate detected</text>

  <rect x="220" y="530" width="758" height="24" fill="#1f2028"/>
  <text x="236" y="546" font-size="11" fill="#888888">2026-07-20 14:25:10</text>
  <rect x="376" y="533" width="80" height="16" rx="8" fill="#F97316" fill-opacity="0.2"/>
  <text x="416" y="545" text-anchor="middle" font-size="10" fill="#F97316">FTP::Brute_Force</text>
  <text x="520" y="546" font-size="11" fill="#D3D1C7">192.168.1.100</text>
