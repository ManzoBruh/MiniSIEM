  <polyline points="236,340 280,310 324,295 368,320 412,280 456,300 524,260 568,290 612,270 660,285 680,340" fill="none" stroke="#3B82F6" stroke-width="2"/>
  <polyline points="236,350 280,340 324,355 368,345 412,350 456,338 524,342 568,335 612,348 660,340 680,350" fill="none" stroke="#F97316" stroke-width="1.5" stroke-dasharray="4,3"/>
