<svg viewBox="0 0 900 720" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arr2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#aaaaaa"/>
    </marker>
  </defs>
  <rect width="900" height="720" fill="#ffffff"/>
  <text x="450" y="34" text-anchor="middle" font-size="18" font-weight="bold" fill="#222222">MiniSIEM — Use Case Diagram (Wazuh + Suricata)</text>

  <!-- System boundary -->
  <rect x="155" y="55" width="625" height="650" rx="10" fill="none" stroke="#333333" stroke-width="1.5"/>
  <text x="467" y="78" text-anchor="middle" font-size="15" font-weight="bold" fill="#222222">Hệ thống MiniSIEM</text>

  <!-- Actor: Nguoi dung -->
  <circle cx="70" cy="390" r="14" fill="#ffffff" stroke="#444444" stroke-width="2"/>
  <line x1="70" y1="404" x2="70" y2="440" stroke="#444444" stroke-width="2"/>
  <line x1="48" y1="418" x2="92" y2="418" stroke="#444444" stroke-width="2"/>
  <line x1="70" y1="440" x2="52" y2="465" stroke="#444444" stroke-width="2"/>
  <line x1="70" y1="440" x2="88" y2="465" stroke="#444444" stroke-width="2"/>
  <text x="70" y="482" text-anchor="middle" font-size="13" fill="#222222">Người dùng</text>

  <!-- Actor: He thong -->
  <rect x="808" y="355" width="60" height="80" rx="4" fill="#f3f3f3" stroke="#555555" stroke-width="1.5"/>
  <line x1="815" y1="375" x2="862" y2="375" stroke="#555555" stroke-width="1"/>
  <line x1="815" y1="393" x2="862" y2="393" stroke="#555555" stroke-width="1"/>
  <line x1="815" y1="411" x2="862" y2="411" stroke="#555555" stroke-width="1"/>
  <line x1="815" y1="429" x2="862" y2="429" stroke="#555555" stroke-width="1"/>
  <text x="838" y="450" text-anchor="middle" font-size="13" fill="#222222">Hệ thống</text>

  <!-- Use cases - User side (left column) -->
  <g fill="#E6F1FB" stroke="#6c8ebf" stroke-width="1.5">
    <ellipse cx="330" cy="115" rx="140" ry="30"/>
    <ellipse cx="330" cy="195" rx="140" ry="30"/>
    <ellipse cx="330" cy="275" rx="140" ry="30"/>
    <ellipse cx="330" cy="355" rx="140" ry="30"/>
    <ellipse cx="330" cy="435" rx="140" ry="30"/>
    <ellipse cx="330" cy="515" rx="140" ry="30"/>
    <ellipse cx="330" cy="595" rx="140" ry="30"/>
  </g>

  <!-- Use cases - System side (right column) -->
  <g fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.5">
    <ellipse cx="620" cy="195" rx="140" ry="30"/>
    <ellipse cx="620" cy="355" rx="140" ry="30"/>
    <ellipse cx="620" cy="515" rx="140" ry="30"/>
  </g>

  <!-- Labels left -->
  <g font-size="11.5" fill="#0C447C" text-anchor="middle">
    <text x="330" y="119">UC01 — Cài Wazuh Agent</text>
    <text x="330" y="199">UC02 — Xem Security Overview</text>
    <text x="330" y="279">UC03 — Xem và điều tra alerts</text>
    <text x="330" y="359">UC04 — Xem danh sách agents</text>
    <text x="330" y="439">UC05 — Xem vulnerability report</text>
    <text x="330" y="519">UC06 — Phân tích file pcap</text>
    <text x="330" y="599">UC07 — Triển khai server stack</text>
  </g>

  <!-- Labels right -->
  <g font-size="11.5" fill="#085041" text-anchor="middle">
    <text x="620" y="191">UC08 — Agent thu thập log</text>
    <text x="620" y="207">real-time (Wazuh Agent)</text>
    <text x="620" y="351">UC09 — Suricata detect</text>
    <text x="620" y="367">network threats</text>
    <text x="620" y="511">UC10 — Manager tạo alerts</text>
    <text x="620" y="527">tự động (real-time)</text>
  </g>

  <!-- Connections user -> left UCs -->
  <g stroke="#aaaaaa" stroke-width="1">
    <line x1="92" y1="408" x2="190" y2="115"/>
    <line x1="92" y1="408" x2="190" y2="195"/>
    <line x1="92" y1="408" x2="190" y2="275"/>
    <line x1="92" y1="408" x2="190" y2="355"/>
    <line x1="92" y1="408" x2="190" y2="435"/>
    <line x1="92" y1="408" x2="190" y2="515"/>
    <line x1="92" y1="408" x2="190" y2="595"/>
  </g>

  <!-- Connections system -> right UCs -->
  <g stroke="#aaaaaa" stroke-width="1">
    <line x1="808" y1="395" x2="760" y2="195"/>
    <line x1="808" y1="395" x2="760" y2="355"/>
    <line x1="808" y1="395" x2="760" y2="515"/>
  </g>

  <!-- Include: UC06 includes UC09 -->
  <line x1="470" y1="515" x2="480" y2="380" stroke="#aaaaaa" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arr2)"/>
  <text x="440" y="455" font-size="10" fill="#888888">«include»</text>

  <!-- Include: UC01 includes UC08 -->
  <line x1="470" y1="115" x2="480" y2="168" stroke="#aaaaaa" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arr2)"/>
  <text x="472" y="140" font-size="10" fill="#888888">«include»</text>

  <!-- Legend -->
  <rect x="170" y="650" width="500" height="45" rx="6" fill="#f9f9f9" stroke="#cccccc"/>
  <rect x="185" y="663" width="20" height="12" rx="6" fill="#E6F1FB" stroke="#6c8ebf"/>
  <text x="212" y="673" font-size="11" fill="#444444">Use case — Người dùng</text>
  <rect x="370" y="663" width="20" height="12" rx="6" fill="#E1F5EE" stroke="#1D9E75"/>
  <text x="397" y="673" font-size="11" fill="#444444">Use case — Hệ thống tự động</text>
</svg>
